apiVersion: v1
kind: Service
metadata:
  name: vault-internal
  labels:
    app: vault
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: http
    - name: cluster
      port: 8201
      targetPort: cluster
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  labels:
    app: vault
spec:
  type: NodePort
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: http
      nodePort: 30485
      protocol: TCP
