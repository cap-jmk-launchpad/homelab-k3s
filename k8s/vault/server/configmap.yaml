apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  labels:
    app: vault
data:
  vault.hcl: |
    ui = true
    disable_mlock = true

    listener "tcp" {
      address         = "[::]:8200"
      cluster_address = "[::]:8201"
      tls_disable     = 1
    }

    storage "raft" {
      path    = "/vault/data"
      node_id = "vault-0"
    }

    cluster_addr = "http://vault-0.vault-internal:8201"
