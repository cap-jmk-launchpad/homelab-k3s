# Template — copy to cluster-secret-store.yaml and set your HCP cluster URL.
# Do NOT commit cluster-secret-store.yaml if it contains cluster-specific URLs
# you consider sensitive (gitignored).
#
#   cp cluster-secret-store.example.yaml cluster-secret-store.yaml
#   kubectl apply -f cluster-secret-store.yaml
#
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: hcp-vault
spec:
  provider:
    vault:
      server: "https://YOUR-CLUSTER.vault.xxxxx.hashicorp.cloud:8200"
      path: secret
      version: v2
      namespace: admin
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
          audiences:
            - vault
