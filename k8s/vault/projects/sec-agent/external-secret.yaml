apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sec-agent-secrets
  namespace: sec-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: homelab-vault
    kind: ClusterSecretStore
  target:
    name: sec-agent-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: saas/sec-agent/staging
