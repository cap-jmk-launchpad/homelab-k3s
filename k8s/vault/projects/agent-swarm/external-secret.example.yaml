# Sync agent-swarm secrets from HCP Vault.
# Generate live manifest: ./scripts/hcp-vault-onboard-project.sh agent-swarm staging agent-swarm
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-swarm-secrets
  namespace: agent-swarm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: hcp-vault
    kind: ClusterSecretStore
  target:
    name: agent-swarm-secrets
    creationPolicy: Owner
  data:
    - secretKey: CURSOR_API_KEY
      remoteRef:
        key: saas/agent-swarm/staging
        property: CURSOR_API_KEY
    - secretKey: GH_TOKEN
      remoteRef:
        key: saas/agent-swarm/staging
        property: GH_TOKEN
    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef:
        key: saas/agent-swarm/staging
        property: SUPABASE_SERVICE_ROLE_KEY
    - secretKey: SUPABASE_ANON_KEY
      remoteRef:
        key: saas/agent-swarm/staging
        property: SUPABASE_ANON_KEY
    - secretKey: SUPABASE_DB_URL
      remoteRef:
        key: saas/agent-swarm/staging
        property: SUPABASE_DB_URL
