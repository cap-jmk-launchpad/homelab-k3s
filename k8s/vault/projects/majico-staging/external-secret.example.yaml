# Sync majico staging secrets from HCP Vault.
# Generate live manifest: ./scripts/hcp-vault-onboard-project.sh majico staging majico-staging
#
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: majico-secrets
  namespace: majico-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: hcp-vault
    kind: ClusterSecretStore
  target:
    name: majico-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: saas/majico/staging
