# Static PV for engine NVMe at /srv/homelab/nvme (after LUKS wipe + ext4 setup).
# Host prep: bash scripts/engine-nvme-disk-apply.sh (from blackpearl)
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: engine-nvme
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: engine-nvme-data
  labels:
    app: homelab
    machine: engine
    tier: nvme
spec:
  capacity:
    storage: 900Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: engine-nvme
  hostPath:
    path: /srv/homelab/nvme
    type: Directory
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - engine
