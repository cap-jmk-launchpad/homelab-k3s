# Klaut.pro WAN TLS (nginx :443) — included from gitlab-edge nginx.conf
# search + research NodePorts; keep in sync with homelab.httpd.toml

upstream searxng {
    server 127.0.0.1:30479;
    keepalive 8;
}

upstream klaut_research_gateway {
    server 127.0.0.1:30487;
    keepalive 8;
}

server {
    listen 443 ssl;
    http2 on;
    server_name search.klaut.pro;

    ssl_certificate     /etc/letsencrypt/live/search.klaut.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/search.klaut.pro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://searxng;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name research.klaut.pro;

    ssl_certificate     /etc/letsencrypt/live/research.klaut.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/research.klaut.pro/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    client_max_body_size 64m;

    location / {
        proxy_pass http://klaut_research_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
}