# GitLab production edge — nginx TLS terminator on :443.
# Deployed by scripts/edge-nginx-apply.sh to /etc/nginx/gitlab-edge/nginx.conf
# Production traffic: nginx :443 → 127.0.0.1:30481 (GitLab NodePort).
# li-httpd dev/benchmark: :8443 (all TLS vhosts). :80 stays li-httpd (ACME + other hosts).

worker_processes auto;
error_log /var/log/nginx/gitlab-edge-error.log warn;
pid /run/nginx-gitlab-edge.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Match homelab.httpd.toml [limits] for Git LFS / large assets
    client_max_body_size 512m;

    upstream gitlab {
        server 127.0.0.1:30481;
        keepalive 32;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name gitlab.lilangverse.xyz registry.gitlab.lilangverse.xyz;

        ssl_certificate     /etc/letsencrypt/live/gitlab.lilangverse.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gitlab.lilangverse.xyz/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;

        location / {
            proxy_pass http://gitlab;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            # Uncompressed upstream bodies — Content-Length matches wire bytes (curl + Playwright gates).
            proxy_set_header Accept-Encoding "";
            proxy_buffering off;
        }
    }
}
