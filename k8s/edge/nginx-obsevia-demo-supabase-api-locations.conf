# Shared Supabase API locations for Obsevia demo vhosts.
# Bypasses Next.js build-time rewrites that may point at dead upstreams
# (e.g. 172.17.0.1:8000). Proxies to Kong NodePort 30480 via supabase_kong.
# Include inside each demo server{} before location /.

location /auth/v1/ {
    proxy_pass http://supabase_kong;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

location /rest/v1/ {
    proxy_pass http://supabase_kong;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

location /realtime/v1/ {
    proxy_pass http://supabase_kong;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
