# Homelab edge routes (beelink-cleanup).
# Merged with majico-staging.httpd.toml on blackpearl — see scripts/edge-lis-apply.sh.
# Backends: k3s NodePorts on loopback (kube-proxy).

# listen on :80 is per [[site]]; :443 TLS uses gen-https-overlay (second li-httpd).
[server]
document_root = "/var/lib/li-httpd/empty"

[health]
max_fails = 3
fail_timeout = "10s"

[upstreams.grafana]
balance = "round_robin"
peers = ["http://127.0.0.1:30300"]

[upstreams.signoz]
balance = "round_robin"
peers = ["http://127.0.0.1:30301"]

[upstreams.agents_dashboard]
balance = "round_robin"
peers = ["http://127.0.0.1:30477"]

[upstreams.postgrest]
balance = "round_robin"
peers = ["http://127.0.0.1:30421"]

[upstreams.li_swarm_dashboard]
balance = "round_robin"
peers = ["http://127.0.0.1:30478"]

[upstreams.searxng]
balance = "round_robin"
peers = ["http://127.0.0.1:30479"]

# Optional WAN CWE mirror (uncomment site block too). Set CWE_PUBLIC_URL=https://cwe.klaut.pro
# [upstreams.cwe_mirror]
# balance = "round_robin"
# peers = ["http://127.0.0.1:30483"]

[upstreams.high_fi_demos]
balance = "round_robin"
peers = ["http://127.0.0.1:30580"]

[upstreams.obsevia_chat_staging]
balance = "round_robin"
peers = ["http://127.0.0.1:30581"]

# Optional WAN GitLab (uncomment site block too). Set GITLAB_PUBLIC_URL=https://gitlab.klaut.pro
# [upstreams.gitlab]
# balance = "round_robin"
# peers = ["http://127.0.0.1:30481"]

# Optional WAN OWASP Dependency-Track (uncomment site block). Set DEPTRACK_PUBLIC_URL=https://deps.klaut.pro
# [upstreams.dependency_track]
# balance = "round_robin"
# peers = ["http://127.0.0.1:30482"]

[[site]]
host = "grafana.homelab.lan"
listen = ":80"

[site.routes]
"GET /health" = "static:healthcheck"
"GET /*" = "proxy:grafana"
"POST /*" = "proxy:grafana"

[[site]]
host = "signoz.homelab.lan"
listen = ":80"

[site.routes]
"GET /health" = "static:healthcheck"
"GET /*" = "proxy:signoz"
"POST /*" = "proxy:signoz"

[[site]]
host = "agents.homelab.lan"
listen = ":80"

[site.routes]
"GET /health" = "static:healthcheck"
"GET /*" = "proxy:agents_dashboard"
"POST /*" = "proxy:agents_dashboard"

[[site]]
host = "api.agents.homelab.lan"
listen = ":80"

[site.routes]
"GET /health" = "static:healthcheck"
"GET /*" = "proxy:postgrest"
"POST /*" = "proxy:postgrest"
"PATCH /*" = "proxy:postgrest"
"DELETE /*" = "proxy:postgrest"
"OPTIONS /*" = "proxy:postgrest"

[[site]]
host = "li-swarm.homelab.lan"
listen = ":80"

[site.routes]
"GET /health" = "static:healthcheck"
"GET /*" = "proxy:li_swarm_dashboard"
"POST /*" = "proxy:li_swarm_dashboard"

