# Homelab edge routes (beelink-cleanup) — li-native WAN + LAN.
# Merged with majico-staging.httpd.toml on blackpearl — see scripts/edge-lis-apply.sh.
# Backends: k3s NodePorts on loopback (kube-proxy).
# Policy: docs/li-native-edge.md

# listen on :80 is per [[site]]; :443 TLS uses gen-https-overlay (second li-httpd).
[server]
document_root = "/var/lib/li-httpd/empty"

[health]
max_fails = 3
fail_timeout = "10s"

[limits]
# GitLab Omnibus: git push/LFS uploads + webpack assets through edge proxy
max_body = "512m"
max_header = "32k"
proxy_max_response_body = "64m"

[upstreams.grafana]
balance = "round_robin"
peers = ["http://127.0.0.1:30300"]

[upstreams.signoz]
balance = "round_robin"
peers = ["http://127.0.0.1:30301"]

[upstreams.agents_dashboard]
balance = "round_robin"
peers = ["http://127.0.0.1:30477"]

[upstreams.postgrest]
balance = "round_robin"
peers = ["http://127.0.0.1:30421"]

[upstreams.li_swarm_dashboard]
balance = "round_robin"
peers = ["http://127.0.0.1:30478"]

[upstreams.searxng]
balance = "round_robin"
peers = ["http://127.0.0.1:30479"]

[upstreams.cwe_mirror]
balance = "round_robin"
peers = ["http://127.0.0.1:30483"]

[upstreams.high_fi_demos]
balance = "round_robin"
peers = ["http://127.0.0.1:30580"]

[upstreams.ducah_staging]
balance = "round_robin"
peers = ["http://127.0.0.1:30583"]

[upstreams.gitlab]
balance = "round_robin"
peers = ["http://127.0.0.1:30481"]

[upstreams.dependency_track]
balance = "round_robin"
peers = ["http://127.0.0.1:30482"]

[upstreams.vault]
balance = "round_robin"
peers = ["http://127.0.0.1:30485"]

[upstreams.chat_staging]
balance = "round_robin"
peers = ["http://127.0.0.1:30581"]

[upstreams.dp_demo]
balance = "round_robin"
peers = ["http://127.0.0.1:30582"]

[upstreams.qroma_demo]
balance = "round_robin"
peers = ["http://127.0.0.1:30584"]

[[site]]
host = "grafana.homelab.lan"
listen = ":80"

[site.routes]
"GET /health" = "static:healthcheck"
"GET /*" = "proxy:grafana"
"POST /*" = "proxy:grafana"

