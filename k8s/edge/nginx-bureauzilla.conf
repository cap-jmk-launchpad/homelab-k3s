# Bureauzilla HTTPS — included from nginx-gitlab-edge.conf when LE cert exists.
# Requires: /etc/letsencrypt/live/bureauzilla.com/
# Backend: k3s NodePort 30596 (namespace bureauzilla on engine).

    upstream bureauzilla_web {
        server 127.0.0.1:30596;
        keepalive 8;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name bureauzilla.com www.bureauzilla.com;

        ssl_certificate     /etc/letsencrypt/live/bureauzilla.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bureauzilla.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        client_max_body_size 10m;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;

        location = /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            proxy_pass http://bureauzilla_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";
            proxy_buffering off;
        }
    }
