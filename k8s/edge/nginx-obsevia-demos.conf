# Obsevia demo HTTPS — installed to /etc/nginx/gitlab-edge/nginx-obsevia-demos.conf
# and included by edge-nginx-apply.sh when LE certs exist on disk.
# location = /health is edge-local (tiny plaintext) so blackbox does not pull Next.js HTML.
# edge-nginx-apply REFUSES to install this file if it has fewer than 7 /health locations.
# Demo auth/rest/realtime go to supabase_kong (see nginx-obsevia-demo-supabase-api-locations.conf)
# so broken Next.js build-time rewrites cannot take demos offline.

    upstream ducah_demo {
        server 127.0.0.1:30583;
        keepalive 8;
    }

    upstream qroma_demo {
        server 127.0.0.1:30584;
        keepalive 8;
    }

    upstream unitedhealth_demo {
        server 127.0.0.1:30588;
        keepalive 8;
    }

    upstream chat_prod {
        server 127.0.0.1:30581;
        keepalive 8;
    }

    upstream dp_demo {
        server 127.0.0.1:30582;
        keepalive 8;
    }

    upstream supabase_kong {
        server 127.0.0.1:30480;
        keepalive 8;
    }

    upstream api_prod {
        server 127.0.0.1:30589;
        keepalive 8;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name ducah.obsevia.com;

        ssl_certificate     /etc/letsencrypt/live/ducah.obsevia.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ducah.obsevia.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location = /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        include /etc/nginx/gitlab-edge/nginx-obsevia-demo-supabase-api-locations.conf;

        location / {
            proxy_pass http://ducah_demo;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }

