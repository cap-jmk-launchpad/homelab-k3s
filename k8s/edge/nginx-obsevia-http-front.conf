# Public HTTP front on :80.
# li-httpd HTTP backends listen on 127.0.0.1:8080 (see edge-lis-apply.sh listen_port rewrite).
# Landing apex/www get a hard HTTPS redirect; everything else is proxied to li-httpd.

server {
    listen 80;
    server_name obsevia.com www.obsevia.com;
    return 301 https://$host$request_uri;
}

# Bureauzilla — ACME + HTTPS redirect (LE cert exists).
server {
    listen 80;
    server_name bureauzilla.com www.bureauzilla.com;

    location /.well-known/acme-challenge/ {
        root /var/lib/li-httpd;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/lib/li-httpd;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
