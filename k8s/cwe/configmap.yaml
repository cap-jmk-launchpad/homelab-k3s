apiVersion: v1
kind: ConfigMap
metadata:
  name: cwe-mirror-scripts
  labels:
    app: cwe-mirror
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 256; }
    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      server {
        listen 8080;
        root /data/public;
        location /health {
          default_type text/plain;
          return 200 "ok\n";
        }
        location / {
          add_header Cache-Control "public, max-age=300";
          try_files $uri =404;
        }
      }
    }
  sync.sh: |
    #!/bin/sh
    set -eu
    DATA="${CWE_DATA_DIR:-/data}"
    PUBLIC="${DATA}/public"
    URL="${CWE_SOURCE_URL:-https://cwe.mitre.org/data/xml/cwec_latest.xml.zip}"
    mkdir -p "${PUBLIC}"
    TMP="$(mktemp -d)"
    trap 'rm -rf "${TMP}"' EXIT
    echo "==> fetch ${URL}"
    curl -fsSL -o "${TMP}/cwec.zip" "${URL}"
    SHA="$(sha256sum "${TMP}/cwec.zip" | awk '{print $1}')"
    if [ -f "${DATA}/.sha256" ] && [ "$(cat "${DATA}/.sha256")" = "${SHA}" ]; then
      echo "==> unchanged (${SHA})"
      exit 0
    fi
    unzip -qo "${TMP}/cwec.zip" -d "${TMP}/xml"
    XML="$(find "${TMP}/xml" -name 'cwec*.xml' | head -1)"
    [ -n "${XML}" ] || { echo "ERROR: no cwec XML in zip" >&2; exit 1; }
    cp "${XML}" "${PUBLIC}/cwec_latest.xml"
    python3 /scripts/build_index.py "${XML}" "${PUBLIC}" "${SHA}" "${URL}"
    echo "${SHA}" > "${DATA}/.sha256"
    echo "==> updated catalog (${SHA})"
  build_index.py: |
    #!/usr/bin/env python3
    """Build manifest.json and weaknesses.json from MITRE CWE XML."""
    import json
    import sys
    import xml.etree.ElementTree as ET
    from datetime import datetime, timezone

    def local(tag: str) -> str:
        return tag.rsplit("}", 1)[-1] if "}" in tag else tag

    def main() -> None:
        if len(sys.argv) < 5:
            print("usage: build_index.py <xml> <public_dir> <sha256> <source_url>", file=sys.stderr)
            sys.exit(1)
        xml_path, public_dir, sha256, source_url = sys.argv[1:5]
        root = ET.parse(xml_path).getroot()
        catalog = {
            "name": root.attrib.get("Name", ""),
            "version": root.attrib.get("Version", ""),
            "date": root.attrib.get("Date", ""),
        }
        weaknesses = []
        for elem in root.iter():
            if local(elem.tag) != "Weakness":
                continue
            wid = elem.attrib.get("ID") or elem.attrib.get("id")
            if not wid:
                continue
            name = ""
            for child in elem:
                if local(child.tag) == "Name":
                    name = (child.text or "").strip()
                    break
            weaknesses.append(
                {
                    "id": int(wid) if str(wid).isdigit() else wid,
                    "name": name,
                    "abstraction": elem.attrib.get("Abstraction", ""),
                    "status": elem.attrib.get("Status", ""),
                    "structure": elem.attrib.get("Structure", ""),
                }
            )
        weaknesses.sort(key=lambda w: (isinstance(w["id"], int), w["id"]))
        synced_at = datetime.now(timezone.utc).isoformat()
        manifest = {
            "source_url": source_url,
            "sha256": sha256,
            "synced_at": synced_at,
            "catalog": catalog,
            "weakness_count": len(weaknesses),
            "mitre_rest_api": "https://cwe-api.mitre.org/api/v1/",
        }
        with open(f"{public_dir}/manifest.json", "w", encoding="utf-8") as f:
            json.dump(manifest, f, indent=2)
            f.write("\n")
        with open(f"{public_dir}/weaknesses.json", "w", encoding="utf-8") as f:
            json.dump(weaknesses, f, indent=2)
            f.write("\n")

    if __name__ == "__main__":
        main()
