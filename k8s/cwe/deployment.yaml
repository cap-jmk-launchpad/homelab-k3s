apiVersion: v1
kind: ConfigMap
metadata:
  name: cwe-mirror-config
  labels:
    app: cwe-mirror
data:
  CWE_SOURCE_URL: "https://cwe.mitre.org/data/xml/cwec_latest.xml.zip"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cwe-mirror
  labels:
    app: cwe-mirror
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cwe-mirror
  template:
    metadata:
      labels:
        app: cwe-mirror
    spec:
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cwe-mirror-data
        - name: nginx-conf
          configMap:
            name: cwe-mirror-scripts
