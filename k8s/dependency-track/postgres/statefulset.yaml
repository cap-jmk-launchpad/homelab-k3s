apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dependency-track-postgres
  labels:
    app: dependency-track-postgres
spec:
  serviceName: dependency-track-postgres
  replicas: 1
  selector:
    matchLabels:
      app: dependency-track-postgres
  template:
    metadata:
      labels:
        app: dependency-track-postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: engine
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: dtrack
            - name: POSTGRES_USER
              value: dtrack
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dependency-track-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - dtrack
                - -d
                - dtrack
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - dtrack
                - -d
                - dtrack
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
