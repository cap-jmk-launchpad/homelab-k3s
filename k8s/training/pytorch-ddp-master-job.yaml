---
apiVersion: batch/v1
kind: Job
metadata:
  name: pytorch-ddp-master
  namespace: training
  labels:
    app: pytorch-ddp-smoke
    ddp-role: master
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: pytorch-ddp-smoke
        ddp-role: master
        job-name: pytorch-ddp-master
        batch.kubernetes.io/job-completion-index: "0"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      restartPolicy: Never
      runtimeClassName: nvidia
      nodeSelector:
        gpu: nvidia
        kubernetes.io/hostname: engine
      containers:
        - name: trainer
          image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime
          command: ["/bin/bash", "/scripts/entrypoint.sh"]
          env:
            - name: JOB_COMPLETION_INDEX
              value: "0"
            - name: ENGINE_MASTER_IP
              value: "192.168.10.32"
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NCCL_DEBUG
              value: INFO
            - name: NCCL_IB_DISABLE
              value: "1"
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: NCCL_SOCKET_IFNAME
              value: eno1,eth0
          ports:
            - containerPort: 29500
              name: dist
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: 4Gi
            requests:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: pytorch-ddp-smoke
            defaultMode: 0755
