apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-smoke-desktop
  namespace: training
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: desktop
        gpu: nvidia
      containers:
        - name: nvidia-smi
          image: nvidia/cuda:12.2.0-base-ubuntu22.04
          command: ["nvidia-smi"]
          resources:
            limits:
              nvidia.com/gpu: 1
