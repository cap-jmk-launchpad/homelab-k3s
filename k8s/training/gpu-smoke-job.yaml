apiVersion: v1
kind: Namespace
metadata:
  name: training
  labels:
    workload: training
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-smoke
  namespace: training
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        workload: training
        gpu: nvidia
      containers:
        - name: nvidia-smi
          image: nvidia/cuda:12.2.0-base-ubuntu22.04
          command: ["nvidia-smi"]
          resources:
            limits:
              nvidia.com/gpu: 1
