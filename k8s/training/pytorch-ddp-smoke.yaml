# 2-rank PyTorch DDP smoke test across GPU nodes (engine + desktop).
# Requires both nodes Ready with gpu=nvidia, nvidia device plugin, and burst mode:
#   ./scripts/desktop-gpu-burst-on.sh   # remove desktop taint before applying
# Restore gaming priority with ./scripts/desktop-gpu-burst-off.sh when done.
apiVersion: v1
kind: Namespace
metadata:
  name: training
  labels:
    workload: training
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pytorch-ddp-smoke
  namespace: training
data:
  entrypoint.sh: |
    #!/bin/bash
    set -euo pipefail
    export RANK="${JOB_COMPLETION_INDEX}"
    export LOCAL_RANK=0
    export WORLD_SIZE=2
    export MASTER_ADDR="pytorch-ddp-master.training.svc.cluster.local"
    export MASTER_PORT=29500
    echo "rank=${RANK} world=${WORLD_SIZE} master=${MASTER_ADDR}:${MASTER_PORT}"
    exec python /scripts/train.py
  train.py: |
    import os
    import socket
    import torch
    import torch.distributed as dist

    def main():
        rank = int(os.environ["RANK"])
        world_size = int(os.environ["WORLD_SIZE"])
        local_rank = int(os.environ.get("LOCAL_RANK", "0"))
        master = os.environ["MASTER_ADDR"]
        port = os.environ["MASTER_PORT"]

        dist.init_process_group(
            backend="nccl",
            init_method=f"tcp://{master}:{port}",
            rank=rank,
            world_size=world_size,
        )

        device = torch.device(f"cuda:{local_rank}")
        host = socket.gethostname()
        t = torch.ones(1, device=device) * rank
        dist.all_reduce(t)
        expected = sum(range(world_size))

        if rank == 0:
            print(f"host={host} device={device} all_reduce={t.item():.0f} expected={expected}")
            if int(t.item()) != expected:
                raise SystemExit(f"DDP smoke failed: got {t.item()}, want {expected}")

        dist.barrier()
        dist.destroy_process_group()
        print(f"rank {rank} ok on {host}")

    if __name__ == "__main__":
        main()
---
apiVersion: v1
kind: Service
metadata:
  name: pytorch-ddp-headless
  namespace: training
spec:
  clusterIP: None
  selector:
    job-name: pytorch-ddp-smoke
  ports:
    - name: dist
      port: 29500
      targetPort: 29500
---
apiVersion: v1
kind: Service
metadata:
  name: pytorch-ddp-master
  namespace: training
spec:
  selector:
    job-name: pytorch-ddp-smoke
    batch.kubernetes.io/job-completion-index: "0"
  ports:
    - name: dist
      port: 29500
      targetPort: 29500
---
apiVersion: batch/v1
kind: Job
metadata:
  name: pytorch-ddp-smoke
  namespace: training
  labels:
    app: pytorch-ddp-smoke
spec:
  ttlSecondsAfterFinished: 3600
  completions: 2
  parallelism: 2
  completionMode: Indexed
  template:
    metadata:
      labels:
        app: pytorch-ddp-smoke
        job-name: pytorch-ddp-smoke
    spec:
      subdomain: pytorch-ddp-headless
      restartPolicy: Never
      runtimeClassName: nvidia
      nodeSelector:
        gpu: nvidia
      tolerations:
        - key: workload
          operator: Equal
          value: burst
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [pytorch-ddp-smoke]
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [engine]
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [desktop]
                  - key: burst
                    operator: In
                    values: ["enabled"]
      containers:
        - name: trainer
          image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime
          command: ["/bin/bash", "/scripts/entrypoint.sh"]
          env:
            - name: NCCL_DEBUG
              value: INFO
          ports:
            - containerPort: 29500
              name: dist
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: 4Gi
            requests:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: pytorch-ddp-smoke
            defaultMode: 0755

