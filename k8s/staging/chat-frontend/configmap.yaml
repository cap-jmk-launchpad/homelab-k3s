apiVersion: v1
kind: ConfigMap
metadata:
  name: obsevia-chat-frontend-config
  namespace: obsevia-chat-staging
  labels:
    app: obsevia-chat-frontend
data:
  NODE_ENV: production
  NEXT_PUBLIC_DEPLOY_ENV: staging
  NEXT_PUBLIC_SITE_URL: https://chat.obsevia.d3bu7.com
  # Runtime overrides for SSR; image build must use the same NEXT_PUBLIC_* (see deploy script).
  DOMAIN: chat.obsevia.d3bu7.com
