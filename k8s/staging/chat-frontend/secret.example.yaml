# Copy to secret.yaml (gitignored), fill from chatbot-frontend .env.staging, then:
#   kubectl apply -f k8s/staging/chat-frontend/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: obsevia-chat-frontend-secrets
  namespace: obsevia-chat-staging
  labels:
    app: obsevia-chat-frontend
type: Opaque
stringData:
  NEXT_PUBLIC_SUPABASE_URL: https://supabase.obsevia.com
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  NEXT_PUBLIC_API_URL: https://api.obsevia.com
  SUPABASE_SERVICE_ROLE_KEY: ""
