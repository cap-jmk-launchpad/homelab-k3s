apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsevia-duca-demo
  namespace: obsevia-ducah-staging
  labels:
    app: obsevia-duca-demo
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: obsevia-duca-demo
  template:
    metadata:
      labels:
        app: obsevia-duca-demo
    spec:
      nodeSelector:
        kubernetes.io/hostname: engine
      containers:
        - name: app
          image: docker.io/library/obsevia-duca-demo-staging:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: obsevia-duca-demo-config
            - secretRef:
                name: obsevia-duca-demo-secrets
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
