apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-async-swarm
  namespace: agent-swarm
  labels:
    app: agents-async-swarm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agents-async-swarm
  template:
    metadata:
      labels:
        app: agents-async-swarm
    spec:
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      initContainers:
        - name: wait-postgrest
          image: curlimages/curl:8.5.0
          env:
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-swarm-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
          command: [sh, -c, "until curl -sf -H \"apikey: ${SUPABASE_SERVICE_ROLE_KEY}\" -H \"Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}\" http://postgrest:54321/rest/v1/; do sleep 3; done"]
      containers:
        - name: async-swarm
          image: node:22-bookworm-slim
          workingDir: /li/li-cursor-agents
          command: [bash, -lc, "cd /li/li-cursor-agents && test -f dist/cli/async-swarm.js || (apt-get update -qq && apt-get install -y -qq curl git python3 ca-certificates && npm ci && npm run build) && exec node dist/cli/async-swarm.js start"]
          envFrom:
            - configMapRef:
                name: agent-swarm-config
            - secretRef:
                name: agent-swarm-secrets
          env:
            - name: LI_AUTO_START_ASYNC_SWARM
              value: "1"
            - name: LI_SWARM_DETACHED
              value: "0"
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              memory: 2560Mi
          volumeMounts:
            - name: li-repo
              mountPath: /li
      volumes:
        - name: li-repo
          hostPath:
            path: /home/s4il0r/li-langverse
            type: DirectoryOrCreate