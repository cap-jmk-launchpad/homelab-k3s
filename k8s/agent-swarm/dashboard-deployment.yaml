apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-dashboard
  namespace: agent-swarm
  labels:
    app: agents-dashboard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agents-dashboard
  template:
    metadata:
      labels:
        app: agents-dashboard
    spec:
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      initContainers:
        - name: wait-postgrest
          image: curlimages/curl:8.5.0
          imagePullPolicy: IfNotPresent
          env:
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-swarm-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
          command:
            - sh
            - -c
            - |
              until curl -sf -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" http://postgrest:54321/rest/v1/; do sleep 3; done
      containers:
        - name: dashboard
          image: node:22-bookworm-slim
          workingDir: /li/li-cursor-agents
          command: [bash, -lc, "cd /li/li-cursor-agents && test -f dist/cli/serve-dashboard.js || (apt-get update -qq && apt-get install -y -qq curl git python3 ca-certificates && npm ci && npm run build) && exec node dist/cli/serve-dashboard.js --port ${LI_AGENT_DASHBOARD_PORT}"]
          ports:
            - name: http
              containerPort: 9477
          envFrom:
            - configMapRef:
                name: agent-swarm-config
            - secretRef:
                name: agent-swarm-secrets
          env:
            - name: AGENTS_SWARM_ROLE
              value: dashboard
            - name: LI_SWARM_EXTERNAL
              value: "1"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              memory: 1536Mi
          volumeMounts:
            - name: li-repo
              mountPath: /li
      volumes:
        - name: li-repo
          hostPath:
            path: /home/s4il0r/li-langverse
            type: DirectoryOrCreate