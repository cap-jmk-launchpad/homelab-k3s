apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-swarm-config
  namespace: agent-swarm
data:
  # Host path on the k3s node where the li monorepo lives (edit before apply).
  LI_HOST_ROOT: "/home/s4il0r/Documents/Cursor/li-langverse"
  LI_AGENT_DASHBOARD_HOST: "0.0.0.0"
  LI_AGENT_DASHBOARD_PORT: "9477"
  LI_CONTROL_PLANE_STORE: "supabase"
  LI_AUTO_START_ASYNC_SWARM: "0"
