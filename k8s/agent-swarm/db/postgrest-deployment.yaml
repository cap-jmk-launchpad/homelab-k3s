apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  labels:
    app: postgrest
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      initContainers:
        - name: wait-postgres
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-swarm-db-secrets
                  key: POSTGRES_PASSWORD
          command: [sh, -c, "until pg_isready -h postgres -p 5432 -U postgres; do sleep 2; done"]
        - name: wait-migrations
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-swarm-db-secrets
                  key: POSTGRES_PASSWORD
          command: [sh, -c, "until psql -h postgres -U postgres -d postgres -At -c \"SELECT to_regclass('public.agent_handoffs');\" | grep -q agent_handoffs; do sleep 3; done"]
      containers:
        - name: postgrest
          image: postgrest/postgrest:v12.2.3
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PGRST_DB_URI
              valueFrom:
                secretKeyRef:
                  name: agent-swarm-db-secrets
                  key: PGRST_DB_URI
            - name: PGRST_DB_SCHEMAS
              value: public
            - name: PGRST_DB_ANON_ROLE
              value: anon
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agent-swarm-db-secrets
                  key: JWT_SECRET
            - name: PGRST_DB_EXTRA_SEARCH_PATH
              value: public
            - name: PGRST_DB_MAX_ROWS
              value: "1000"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi