# Template — create live secret with scripts/k8s-agent-swarm-db-secret.sh
apiVersion: v1
kind: Secret
metadata:
  name: agent-swarm-db-secrets
  namespace: agent-swarm
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-postgres"
  AUTHENTICATOR_PASSWORD: "change-me-authenticator"
  JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
  PGRST_DB_URI: "postgresql://authenticator:change-me-authenticator@postgres:5432/postgres"
