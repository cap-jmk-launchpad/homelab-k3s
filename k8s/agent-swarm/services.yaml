apiVersion: v1
kind: Service
metadata:
  name: postgrest-external
  namespace: agent-swarm
  labels:
    app: postgrest
spec:
  type: NodePort
  selector:
    app: postgrest
  ports:
    - name: http
      port: 54321
      targetPort: 3000
      nodePort: 30421
---
apiVersion: v1
kind: Service
metadata:
  name: agents-dashboard
  namespace: agent-swarm
  labels:
    app: agents-dashboard
spec:
  type: NodePort
  selector:
    app: agents-dashboard
  ports:
    - name: http
      port: 9477
      targetPort: http
      nodePort: 30477
