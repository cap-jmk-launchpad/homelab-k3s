apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: searxng
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: searxng-config
    files:
      - config/settings.yml
      - config/limiter.toml
resources:
  - namespace.yaml
  - valkey-deployment.yaml
  - deployment.yaml
  - service.yaml
