apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  labels:
    app: searxng
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      initContainers:
        - name: wait-valkey
          image: valkey/valkey:8.0-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until valkey-cli -h valkey ping | grep -q PONG; do sleep 2; done
      containers:
        - name: searxng
          image: searxng/searxng:2026.5.29-780ee3256
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.klaut.pro/"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secrets
                  key: SEARXNG_SECRET
            - name: SEARXNG_VALKEY_URL
              value: "valkey://valkey:6379/0"
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
            - name: config
              mountPath: /etc/searxng/limiter.toml
              subPath: limiter.toml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: searxng-config
