# Template only — do NOT commit real keys. Create the live secret with:
#   ./scripts/k8s-searxng-secret.sh
#
apiVersion: v1
kind: Secret
metadata:
  name: searxng-secrets
  namespace: searxng
type: Opaque
stringData:
  SEARXNG_SECRET: "replace-me-with-openssl-rand-hex-32"
  # Optional: protect /metrics when enable_metrics is true
  SEARXNG_OPEN_METRICS_USER: "metrics"
  SEARXNG_OPEN_METRICS_SECRET: "replace-me"
