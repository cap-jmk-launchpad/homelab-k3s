apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: searxng
  labels:
    app: valkey
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      containers:
        - name: valkey
          image: valkey/valkey:8.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: valkey
              containerPort: 6379
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: searxng
  labels:
    app: valkey
spec:
  type: ClusterIP
  selector:
    app: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
