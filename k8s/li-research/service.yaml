# Klaut Research Gateway — Service (NodePort 30486 for li-httpd edge)
apiVersion: v1
kind: Service
metadata:
  name: klaut-research-gateway
  namespace: li-research
  labels:
    app: klaut-research-gateway
    app.kubernetes.io/name: klaut-research-gateway
spec:
  type: NodePort
  selector:
    app: klaut-research-gateway
  ports:
    - name: http
      port: 8010
      targetPort: http
      nodePort: 30486
