# Example secret for research gateway (do not commit real values).
# kubectl -n li-research create secret generic klaut-research-secrets \
#   --from-literal=GH_TOKEN=... \
#   --from-literal=S2_API_KEY=... \
#   --from-literal=OPENALEX_MAILTO=ops@klaut.pro \
#   --from-literal=CROSSREF_MAILTO=ops@klaut.pro
apiVersion: v1
kind: Secret
metadata:
  name: klaut-research-secrets
  namespace: li-research
type: Opaque
stringData:
  GH_TOKEN: "REPLACE_ME"
  S2_API_KEY: "REPLACE_ME"
  OPENALEX_MAILTO: "ops@klaut.pro"
  CROSSREF_MAILTO: "ops@klaut.pro"
