# Static PV for warm index on engine second Intenso (sdc @ /srv/homelab/intenso-research).
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: li-research-warm-index
  labels:
    app: li-research
    app.kubernetes.io/component: warm-index
    machine: engine
spec:
  capacity:
    storage: 250Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: li-research-bulk
  hostPath:
    path: /srv/homelab/intenso-research/li-research/warm-index
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - engine
