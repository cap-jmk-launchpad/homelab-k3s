apiVersion: batch/v1
kind: Job
metadata:
  name: supabase-migrate
  labels:
    app: supabase-migrate
spec:
  backoffLimit: 3
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      restartPolicy: OnFailure
      initContainers:
        - name: wait-db
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: POSTGRES_PASSWORD
          command: [sh, -c, "until pg_isready -h db -p 5432 -U postgres; do sleep 2; done"]
      containers:
        - name: migrate
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: POSTGRES_PASSWORD
          command: [sh, /scripts/migrate.sh]
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: supabase-migrations
        - name: scripts
          configMap:
            name: supabase-migrate-scripts
            defaultMode: 0755
