apiVersion: batch/v1
kind: CronJob
metadata:
  name: supabase-backup
  labels:
    app: supabase-backup
spec:
  schedule: "0 3 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: blackpearl
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:15-alpine
              command: [sh, /scripts/backup.sh]
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: supabase-secrets
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: supabase-backups
            - name: scripts
              configMap:
                name: supabase-backup-scripts
                defaultMode: 0755
