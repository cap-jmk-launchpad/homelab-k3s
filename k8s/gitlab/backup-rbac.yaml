apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-backup
  labels:
    app: gitlab-backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-backup
  labels:
    app: gitlab-backup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-backup
  labels:
    app: gitlab-backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitlab-backup
subjects:
  - kind: ServiceAccount
    name: gitlab-backup
