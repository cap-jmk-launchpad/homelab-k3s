apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-runner
  namespace: gitlab
  labels:
    app: gitlab-runner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab-runner
  template:
    metadata:
      labels:
        app: gitlab-runner
    spec:
      serviceAccountName: gitlab-runner
      nodeSelector:
        kubernetes.io/hostname: engine
      containers:
        - name: runner
          image: gitlab/gitlab-runner:v17.11.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              RUNNER_URL="${GITLAB_RUNNER_URL:-http://gitlab.gitlab.svc.cluster.local}"
              echo "Waiting for GitLab API at ${RUNNER_URL}..."
              for i in $(seq 1 120); do
                if wget -q -O /dev/null "${RUNNER_URL}/users/sign_in" 2>/dev/null; then
                  break
                fi
                sleep 10
              done
              if [[ ! -f /etc/gitlab-runner/config.toml ]] || ! grep -q '^\[\[runners\]\]' /etc/gitlab-runner/config.toml; then
                cp /etc/gitlab-runner-base/config.toml /etc/gitlab-runner/config.toml
                gitlab-runner register --non-interactive \
                  --config /etc/gitlab-runner/config.toml \
                  --url "${RUNNER_URL}" \
                  --registration-token "${GITLAB_RUNNER_REGISTRATION_TOKEN}" \
                  --executor kubernetes \
                  --kubernetes-namespace "${GITLAB_NAMESPACE}" \
                  --kubernetes-service-account gitlab-runner \
                  --kubernetes-node-selector "kubernetes.io/hostname=engine" \
                  --kubernetes-helper-image "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:x86_64-v17.11.4" \
                  --kubernetes-helper-image-pull-policy "if-not-present" \
                  --kubernetes-pull-policy "if-not-present" \
                  --description "homelab-k8s" \
                  --tag-list "homelab-k8s" \
                  --run-untagged=true \
                  --locked=false
              fi
              # Do not sed-patch config.toml here — inline inserts corrupt [runners.kubernetes] TOML
              # (empty overwrite keys become node selectors). Use scripts/k8s-gitlab-runner-patch-config.sh instead.
              exec gitlab-runner run --user=gitlab-runner --working-directory=/home/gitlab-runner
          env:
            - name: GITLAB_RUNNER_URL
              value: "http://gitlab.gitlab.svc.cluster.local"
            - name: GITLAB_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitlab-secrets
                  key: GITLAB_RUNNER_REGISTRATION_TOKEN
            - name: GITLAB_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: gitlab-secrets
                  key: GITLAB_NAMESPACE
          volumeMounts:
            - name: config
              mountPath: /etc/gitlab-runner
            - name: runner-base
              mountPath: /etc/gitlab-runner-base
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: gitlab-runner-config
        - name: runner-base
          configMap:
            name: gitlab-runner-config
