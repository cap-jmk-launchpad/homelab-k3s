apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-runner
  namespace: gitlab
  labels:
    app: gitlab-runner
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab-runner
  template:
    metadata:
      labels:
        app: gitlab-runner
    spec:
      serviceAccountName: gitlab-runner
      nodeSelector:
        kubernetes.io/hostname: engine
      containers:
        - name: runner
          image: gitlab/gitlab-runner:v17.11.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              RUNNER_URL="${GITLAB_RUNNER_URL:-http://gitlab.gitlab.svc.cluster.local}"
              echo "Waiting for GitLab API at ${RUNNER_URL}..."
              for i in $(seq 1 120); do
                if wget -q -O /dev/null "${RUNNER_URL}/users/sign_in" 2>/dev/null; then
                  break
                fi
                sleep 10
              done
              if [[ ! -f /etc/gitlab-runner/config.toml ]] || ! grep -q '^\[\[runners\]\]' /etc/gitlab-runner/config.toml; then
                cp /etc/gitlab-runner-base/config.toml /etc/gitlab-runner/config.toml
                gitlab-runner register --non-interactive \
                  --config /etc/gitlab-runner/config.toml \
                  --url "${RUNNER_URL}" \
                  --registration-token "${GITLAB_RUNNER_REGISTRATION_TOKEN}" \
                  --executor kubernetes \
                  --kubernetes-namespace "${GITLAB_NAMESPACE}" \
                  --kubernetes-service-account gitlab-runner \
                  --description "homelab-k8s" \
                  --tag-list "homelab-k8s" \
                  --run-untagged=true \
                  --locked=false
              fi
              if [[ -f /etc/gitlab-runner/config.toml ]] && ! grep -q 'kubernetes.io/hostname' /etc/gitlab-runner/config.toml; then
                if grep -q '\[runners.kubernetes.node_selector\]' /etc/gitlab-runner/config.toml; then
                  sed -i '/\[runners.kubernetes.node_selector\]/a\    "kubernetes.io/hostname" = "engine"' /etc/gitlab-runner/config.toml
                else
                  sed -i '/service_account = "gitlab-runner"/a\\n  [runners.kubernetes.node_selector]\n    "kubernetes.io/hostname" = "engine"' /etc/gitlab-runner/config.toml
                fi
              fi
              if [[ -f /etc/gitlab-runner/config.toml ]] && ! grep -q 'allowed_pull_policies' /etc/gitlab-runner/config.toml; then
                sed -i '/service_account = "gitlab-runner"/a\    allowed_pull_policies = ["always", "if-not-present"]' /etc/gitlab-runner/config.toml
              fi
              if [[ -f /etc/gitlab-runner/config.toml ]] && ! grep -q '^    pull_policy = ' /etc/gitlab-runner/config.toml; then
                sed -i '/service_account = "gitlab-runner"/a\    pull_policy = "if-not-present"' /etc/gitlab-runner/config.toml
              fi
              exec gitlab-runner run --user=gitlab-runner --working-directory=/home/gitlab-runner
          env:
            - name: GITLAB_RUNNER_URL
              value: "http://gitlab.gitlab.svc.cluster.local"
            - name: GITLAB_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitlab-secrets
                  key: GITLAB_RUNNER_REGISTRATION_TOKEN
            - name: GITLAB_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: gitlab-secrets
                  key: GITLAB_NAMESPACE
          volumeMounts:
            - name: config
              mountPath: /etc/gitlab-runner
            - name: runner-base
              mountPath: /etc/gitlab-runner-base
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: gitlab-runner-config
        - name: runner-base
          configMap:
            name: gitlab-runner-config
