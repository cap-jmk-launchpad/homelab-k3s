apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitlab
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: gitlab-backup-scripts
    files:
      - scripts/backup.sh
      - scripts/prune-backups.sh
resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - statefulset.yaml
  - service.yaml
  - runner-rbac.yaml
  - runner-configmap.yaml
  - runner-pvc.yaml
  - runner-deployment.yaml
  - backup-pvc.yaml
  - backup-rbac.yaml
  - backup-cronjob.yaml
  - backup-prune-cronjob.yaml
