# Binds UDP/TCP :53 on the blackpearl node (192.168.10.33) via hostNetwork.
# Fritz DHCP should hand out 192.168.10.33 as LAN DNS — see docs/homelab-lan-dns.md
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: homelab-lan-coredns
  namespace: homelab-dns
  labels:
    app: homelab-lan-coredns
spec:
  selector:
    matchLabels:
      app: homelab-lan-coredns
  template:
    metadata:
      labels:
        app: homelab-lan-coredns
    spec:
      hostNetwork: true
      dnsPolicy: Default
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      tolerations:
        - operator: Exists
      containers:
        - name: coredns
          image: coredns/coredns:1.11.3
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
            - name: resolv
              mountPath: /etc/resolv.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: homelab-lan-coredns
            items:
              - key: Corefile
                path: Corefile
              - key: homelab.hosts
                path: homelab.hosts
        - name: resolv
          hostPath:
            path: /etc/resolv.conf
            type: File
