# Homelab values for prometheus-community/kube-prometheus-stack
# Install / upgrade:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install prometheus-stack prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f kube-prometheus-stack-values.yaml \
#     --set grafana.adminPassword='<set at deploy, not in git>'
#
# Retention: metrics older than 180d \(6 months\) are dropped automatically (Prometheus TSDB).
# TSDB on engine HDD: /srv/homelab/prometheus (PV prometheus-engine-tsdb) - see docs/homelab-monitoring.md.

fullnameOverride: prometheus-stack

defaultRules:
  create: true
  rules:
    alertmanager: false
    etcd: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/hostname: blackpearl
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        memory: 64Mi
      limits:
        memory: 256Mi

grafana:
  enabled: true
  # Set at deploy time: --set grafana.adminPassword='...'
  adminPassword: CHANGE_ME_DEPLOY_TIME
  # Do NOT set [unified_alerting] min_refresh_interval here (Grafana 13 CrashLoops on bad values).
  grafana.ini:
    dashboards:
      default_refresh_intervals: "1s 2s 5s 10s 30s 1m 5m 15m 30m 1h"
  env:
    GF_DASHBOARDS_DEFAULT_REFRESH_INTERVALS: "1s,2s,5s,10s,30s,1m,5m,15m,30m,1h"
    GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "1s"
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
  service:
    type: NodePort
    nodePort: 30300
    port: 80
  nodeSelector:
    kubernetes.io/hostname: blackpearl
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

prometheus:
  enabled: true
  prometheusSpec:
    retention: 180d
    retentionSize: 200GB
    scrapeInterval: 30s
    externalLabels:
      cluster: homelab
    nodeSelector:
      kubernetes.io/hostname: engine
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 4Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: prometheus-engine
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 250Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}

prometheusOperator:
  admissionWebhooks:
    patch:
      nodeSelector:
        kubernetes.io/hostname: blackpearl
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
  nodeSelector:
    kubernetes.io/hostname: blackpearl
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

kube-state-metrics:
  prometheus:
    monitor:
      metricRelabelings:
        - targetLabel: cluster
          replacement: homelab
  nodeSelector:
    kubernetes.io/hostname: blackpearl
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

prometheus-node-exporter:
  enabled: true
  hostRootFsMount:
    enabled: false
  prometheus:
    monitor:
      metricRelabelings:
        - targetLabel: cluster
          replacement: homelab
  tolerations:
    - operator: Exists

kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
