# Static PV for Loki on engine HDD (sda2 mounted at /).
# Apply before helm upgrade when enabling singleBinary.persistence.
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: loki-engine
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: loki-engine-data
  labels:
    app: loki
    machine: engine
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: loki-engine
  hostPath:
    path: /srv/homelab/loki
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - engine
