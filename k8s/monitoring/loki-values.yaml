# Homelab Loki (SingleBinary / Monolithic on engine HDD).
#
# Install / upgrade (on blackpearl):
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   kubectl apply -f loki-engine-pv.yaml
#   helm upgrade --install loki grafana/loki -n monitoring -f loki-values.yaml
#
# Chart >= 12.0 renames SingleBinary to Monolithic; both work with this file.
# Retention: 14 days. PVC: 100Gi on engine (/srv/homelab/loki).

fullnameOverride: loki

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
  limits_config:
    retention_period: 336h
    max_query_series: 10000
    max_query_parallelism: 4
  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: filesystem
    compaction_interval: 10m

singleBinary:
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: engine
  persistence:
    enabled: true
    storageClass: loki-engine
    size: 100Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi

# Disable distributed / microservices modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

gateway:
  enabled: false

minio:
  enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
